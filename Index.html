inding globulin", "Bound only to albumin", "Inside erythrocytes", "Only through portal veins"], "rationale": "Water-soluble hormones generally do not require carrier proteins.", "whyWrong": "", "difficulty": "Review Trap", "tag": "Review 50"}, {"id": "Q0117", "bank": "review", "lecture": "Review 50", "subtopic": "Feedback", "q": "Which process is the best example of positive feedback from the lecture?", "answer": "Cervical dilation stimulating oxytocin release and stronger uterine contractions", "distractors": ["High thyroid hormone suppressing TSH", "High cortisol suppressing ACTH", "High hormone reducing receptor number", "Low hormone increasing receptor number"], "rationale": "Oxytocin during labor reinforces the change, making it positive feedback.", "whyWrong": "", "difficulty": "Review Trap", "tag": "Review 50"}, {"id": "Q0118", "bank": "review", "lecture": "Review 50", "subtopic": "Control of Secretion", "q": "Which is an example of hormone secretion controlled by chemical changes in blood?", "answer": "Blood calcium regulating parathyroid hormone secretion", "distractors": ["Nerve impulses to adrenal medulla", "ACTH stimulating cortisol", "TRH stimulating TSH", "Oxytocin stimulating uterine contractions"], "rationale": "Blood Ca2+ is a chemical change that directly regulates PTH secretion.", "whyWrong": "", "difficulty": "Review Trap", "tag": "Review 50"}, {"id": "Q0119", "bank": "review", "lecture": "Review 50", "subtopic": "Control of Secretion", "q": "Which is an example of hormone secretion controlled by the nervous system?", "answer": "Nerve impulses to adrenal medullae regulating epinephrine release", "distractors": ["Blood calcium regulating PTH", "ACTH stimulating cortisol", "TSH stimulating T3/T4", "Gastrin release from G cells"], "rationale": "The adrenal medulla receives neural input that regulates catecholamine release.", "whyWrong": "", "difficulty": "Review Trap", "tag": "Review 50"}, {"id": "Q0120", "bank": "review", "lecture": "Review 50", "s <script>
(function(){

function $(id){return document.getElementById(id)}
function bind(id,fn){const x=$(id); if(x) x.onclick=fn}
function key(k){return "ap2endo_v10_"+k}

function save(k,v){try{localStorage.setItem(key(k),JSON.stringify(v))}catch(e){}}

function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function fmt(sec){sec=Math.max(0,sec|0);return String(Math.floor(sec/60)).padStart(2,"0")+":"+String(sec%60).padStart(2,"0")}
function haptic(){try{navigator.vibrate&&navigator.vibrate(8)}catch(e){}}
function poolLecture(){return selectedLecture==="All"?LECTURE:LECTURE.filter(q=>q.lecture===selectedLecture)}
function flaggedFilter(pool){const f=load("flagged",{});return pool.filter(q=>!f[q.id])}
function makeQ(q){let opts=shuffle([q.answer,...q.distractors]).slice(0,5); if(!opts.includes(q.answer)) opts[0]=q.answer; opts=shuffle(opts); return {...q,options:opts,correct:opts.indexOf(q.answer)}}
function stats(){const p=Object.values(load("prog",{})); const total=p.reduce((a,b)=>a+b.total,0), right=p.reduce((a,b)=>a+b.right,0); const acc=total?Math.round(right/total*100):0; const miss=Object.keys(load("miss",{})).length; const weak=Object.keys(load("weak",{})).length; const weakTopics=p.filter(x=>x.total>=2 && x.right/x.total<.8).length; const weakCount=miss+weak+weakTopics; const prepared=total?Math.max(0,Math.min(100,acc-Math.min(15,Math.round(weakCount/5)))):0; return {p,total,right,acc,miss,weak,weakTopics,weakCount,prepared}}
function updateHeader(){const s=stats(); $("preparedMetric").innerHTML=`<strong>${s.prepared}%</strong><span> Prepared</span>`; $("weakMetric").innerHTML=`<strong>${s.weakCount}</strong><span> Weak</span>`}
function show(page){["home","quiz","results","weak","analytics","settings"].forEach(id=>$(id).classList.toggle("hidden",id!==page)); ["tabHome","tabAnalytics","tabSettings"].forEach(id=>$(id).classList.remove("active")); if(page==="analytics"){$("tabAnalytics").classList.add("active");renderAnalytics()} else if(page==="settings"){$("tabSettings").classList.add("active");renderSettings()} else if(page==="weak"){$("tabHome").classList.add("active");renderWeak()} else $("tabHome").classList.add("active"); if(page==="home")buildHome(); window.scrollTo(0,0)}
function buildHome(){updateHeader(); const lectures=["All",...Array.from(new Set(LECTURE.map(q=>q.lecture)))]; const grid=$("lectureGrid"); if(grid){grid.innerHTML=""; lectures.forEach(name=>{const n=name==="All"?LECTURE.length:LECTURE.filter(q=>q.lecture===name).length; const b=document.createElement("button"); b.className="tile"+(name===selectedLecture?" selected":""); b.innerHTML=`<strong>${esc(name)}</strong><br><span class="small">${n} questions</span>`; b.onclick=()=>{selectedLecture=name;buildHome();haptic()}; grid.appendChild(b)})} const w=$("countWheel"), num=$("countNumber"), hint=$("countHint"); if(w&&num){w.value=selectedCount;num.value=selectedCount;hint.textContent=`${selectedCount} question${selectedCount===1?"":"s"} selected`; w.oninput=()=>{selectedCount=+w.value;num.value=selectedCount;hint.textContent=`${selectedCount} question${selectedCount===1?"":"s"} selected`}; num.oninput=()=>{selectedCount=Math.max(1,Math.min(100,+num.value||1));w.value=selectedCount;hint.textContent=`${selectedCount} question${selectedCount===1?"":"s"} selected`};}}
function weakPool(){const miss=load("miss",{}), weak=load("weak",{}), prog=load("prog",{}); const weakKeys=Object.keys(prog).filter(k=>prog[k].total>=2 && prog[k].right/prog[k].total<.8); let arr=ALL.filter(q=>miss[q.id]||weak[q.id]||weakKeys.includes(q.lecture+"|"+q.subtopic)); return flaggedFilter(arr.length?arr:LECTURE)}
function start(mode,countOverride){currentMode=mode; let pool= mode==="review"?REVIEW : mode==="weak"?weakPool() : poolLecture(); pool=flaggedFilter(pool); if(avoidRepeats&&mode==="practice"){const seen=load("seen",{})[selectedLecture]||[]; const unseen=pool.filter(q=>!seen.includes(q.id)); if(unseen.length)pool=unseen} if(!pool.length){alert("No questions available.");return} const count=Math.min(countOverride||selectedCount,pool.length); quiz=shuffle(pool).slice(0,count).map(makeQ); idx=0; answers=Array(count).fill(null); confidence=Array(count).fill(""); saved=Array(count).fill(false); startTime=Date.now(); qStart=Date.now(); clearInterval(timer); timer=setInterval(()=>{$("timer").textContent=fmt((Date.now()-startTime)/1000)},500); show("quiz"); renderQ()}
function renderQ(){const q=quiz[idx], chosen=answers[idx], answered=chosen!==null, reveal=answered && !(currentMode==="review"&&hideReview); $("fill").style.width=((idx+1)/quiz.length*100)+"%"; $("qnum").textContent=`Question ${idx+1} / ${quiz.length}`; $("qnum").onclick=openNavigator; $("score").textContent=`Score: ${answers.filter((a,i)=>a===quiz[i].correct).length}`; let h=`<span class="tag">${esc(q.lecture)} · ${esc(q.subtopic)}</span><div class="qtext">${esc(q.q)}</div>`; q.options.forEach((op,i)=>{let cls="option"; if(reveal)cls+= i===q.correct?" correct":i===chosen?" wrong":" dim"; h+=`<button class="${cls}" ${answered?"disabled":""} data-i="${i}"><span class="letter">${LETTERS[i]}</span><span>${esc(op)}</span></button>`}); if(answered&&!reveal)h+=`<div class="explain"><strong>Answer locked.</strong><br>Answers are hidden in Review mode. Change this in Settings.</div>`; if(reveal)h+=`<div class="explain"><strong>${chosen===q.correct?"Correct.":"Correct answer: "+LETTERS[q.correct]+" — "+esc(q.answer)}</strong><br><br><strong>Why:</strong><br>${esc(q.rationale)}<div class="confrow"><button class="confbtn" data-conf="knew">I knew that</button><button class="confbtn" data-conf="guessed">I guessed</button><button class="confbtn" data-conf="dontknow">I don’t fucking know</button><button class="confbtn" data-conf="tricked">I got tricked</button></div><button class="flagbtn" data-flag="1">Flag bad question / remove</button></div>`; $("slot").innerHTML=h; document.querySelectorAll(".option").forEach(b=>b.onclick=()=>{answers[idx]=+b.dataset.i; if(!confidence[idx])confidence[idx]="guessed"; saveAnswer(idx); renderQ(); haptic()}); document.querySelectorAll("[data-conf]").forEach(b=>b.onclick=()=>{confidence[idx]=b.dataset.conf; if(["guessed","dontknow","tricked"].includes(confidence[idx])){const wk=load("weak",{});wk[q.id]=true;save("weak",wk)} updateConfidence(idx); updateHeader(); haptic(); if(autoAdvance)setTimeout(()=>nextQ(),250)}); document.querySelectorAll("[data-flag]").forEach(b=>b.onclick=()=>{const f=load("flagged",{});f[q.id]=true;save("flagged",f);b.textContent="Flagged";b.disabled=true}); $("next").disabled=!answered; $("prev").disabled=idx===0; $("next").textContent=idx===quiz.length-1?"Finish":"Next"}
function saveAnswer(i){if(saved[i]||answers[i]===null)return; const q=quiz[i], ok=answers[i]===q.correct, t=Math.max(1,Math.round((Date.now()-qStart)/1000)); const prog=load("prog",{}), miss=load("miss",{}), hist=load("hist",[]), seen=load("seen",{}); const k=q.lecture+"|"+q.subtopic; if(!prog[k])prog[k]={lecture:q.lecture,subtopic:q.subtopic,right:0,total:0,time:0,misses:0}; prog[k].total++; prog[k].time+=t; if(ok){prog[k].right++;delete miss[q.id]} else {miss[q.id]=true;prog[k].misses++} if(!seen[selectedLecture])seen[selectedLecture]=[]; if(!seen[selectedLecture].includes(q.id))seen[selectedLecture].push(q.id); hist.push({date:Date.now(),id:q.id,lecture:q.lecture,subtopic:q.subtopic,right:ok?1:0,time:t,selected:q.options[answers[i]],correct:q.answer,conf:confidence[i]}); save("prog",prog);save("miss",miss);save("hist",hist.slice(-1000));save("seen",seen); saved[i]=true; updateHeader()}
function updateConfidence(i){const q=quiz[i], ok=answers[i]===q.correct, conf=load("conf",{knew:{r:0,t:0},guessed:{r:0,t:0},dontknow:{r:0,t:0},tricked:{r:0,t:0}}); const c=confidence[i]; if(conf[c]){conf[c].t++; if(ok)conf[c].r++} save("conf",conf)}
function nextQ(){if(idx<quiz.length-1){idx++;qStart=Date.now();renderQ();window.scrollTo(0,0)}else finish()}
function finish(){clearInterval(timer); const right=answers.filter((a,i)=>a===quiz[i].correct).length, pct=Math.round(right/quiz.length*100); $("results").innerHTML=`<section class="card"><div class="label">Results</div><div class="result">${pct}%</div><div class="small">${right} / ${quiz.length} correct</div><div class="nav"><button class="secondary" id="resHome">Home</button><button class="primaryBtn" id="resWeak">Weak Areas</button></div></section>`; show("results"); bind("resHome",()=>show("home")); bind("resWeak",()=>show("weak"))}
function renderWeak(){const wk=weakPool(); $("weak").innerHTML=`<section class="card"><div class="label">Weak Areas</div><div class="small">Guessed, tricked, missed, and low-performing topics.</div><button class="primaryBtn" id="startWeak" style="width:100%;margin-top:12px">Start Weak Quiz</button></section><section class="card"><div class="label">Weak Pool</div><table>${wk.slice(0,20).map(q=>`<tr><td><strong>${esc(q.subtopic)}</strong><br><span class="small">${esc(q.q)}</span></td></tr>`).join("")||'<tr><td class="small">No weak questions yet.</td></tr>'}</table></section>`; bind("startWeak",()=>start("weak"))}
function renderAnalytics(){const s=stats(), hist=load("hist",[]), conf=load("conf",{knew:{r:0,t:0},guessed:{r:0,t:0},dontknow:{r:0,t:0},tricked:{r:0,t:0}}); const avg=hist.length?Math.round(hist.reduce((a,b)=>a+(b.time||0),0)/hist.length):0; const topics=s.p.slice().sort((a,b)=>(a.right/a.total)-(b.right/b.total)).slice(0,10).map(x=>`<tr><td><strong>${esc(x.subtopic)}</strong><br><span class="small">${esc(x.lecture)}</span></td><td>${Math.round(x.right/x.total*100)}%<br><span class="small">${x.right}/${x.total}</span></td></tr>`).join(""); function cr(k,l){const x=conf[k]||{r:0,t:0};return `<tr><td><strong>${l}</strong></td><td>${x.t?Math.round(x.r/x.t*100)+"%":"—"}<br><span class="small">${x.r}/${x.t}</span></td></tr>`} $("analytics").innerHTML=`<section class="card"><div class="label">Analytics</div><div class="kpi"><div class="box"><span class="small">Prepared</span><strong>${s.prepared}%</strong></div><div class="box"><span class="small">Accuracy</span><strong>${s.acc}%</strong></div><div class="box"><span class="small">Answered</span><strong>${s.total}</strong></div></div><div class="small" style="margin-top:10px">Average: ${avg} sec/question</div></section><section class="card"><div class="label">Confidence</div><table>${cr("knew","I knew that")+cr("guessed","I guessed")+cr("dontknow","I don’t fucking know")+cr("tricked","I got tricked")}</table></section><section class="card"><div class="label">Lowest Topics</div><table><tr><th>Topic</th><th>Score</th></tr>${topics}</table></section>`}
function renderSettings(){$("settings").innerHTML=`<section class="card"><div class="label">Settings</div><button class="secondary" id="toggleRepeat" style="width:100%">Prioritize Unseen: ${avoidRepeats?"On":"Off"}</button><button class="secondary" id="toggleAuto" style="width:100%;margin-top:10px">Auto Advance: ${autoAdvance?"On":"Off"}</button><button class="secondary" id="toggleHide" style="width:100%;margin-top:10px">Hide Review Answers: ${hideReview?"On":"Off"}</button><button class="danger" id="resetAll" style="width:100%;margin-top:10px">Reset Progress</button></section>`; bind("toggleRepeat",()=>{avoidRepeats=!avoidRepeats;save("avoid",avoidRepeats);renderSettings()}); bind("toggleAuto",()=>{autoAdvance=!autoAdvance;save("autoAdvance",autoAdvance);renderSettings()}); bind("toggleHide",()=>{hideReview=!hideReview;save("hideReview",hideReview);renderSettings()}); bind("resetAll",()=>{if(confirm("Reset all progress?")){["prog","miss","weak","hist","seen","conf","flagged"].forEach(del);updateHeader();renderSettings()}})}
function openNavigator(){let h='<div class="jumpPanel"><div class="label">Question Navigator</div><div class="jumpGrid">'; quiz.forEach((q,i)=>{let cls=answers[i]===null?"":answers[i]===q.correct?"done":"bad"; if(["guessed","dontknow","tricked"].includes(confidence[i]))cls="warn"; h+=`<button class="jumpBtn ${cls}" data-j="${i}">${i+1}</button>`}); h+='</div><button class="secondary" id="closeJump" style="width:100%;margin-top:14px">Close</button></div>'; $("jumpOverlay").innerHTML=h; $("jumpOverlay").classList.remove("hidden"); document.querySelectorAll("[data-j]").forEach(b=>b.onclick=()=>{idx=+b.dataset.j;qStart=Date.now();$("jumpOverlay").classList.add("hidden");renderQ()}); bind("closeJump",()=>$("jumpOverlay").classList.add("hidden"))}
bind("homeTitle",()=>show("home")); bind("preparedMetric",()=>show("analytics")); bind("weakMetric",()=>start("weak")); bind("tabHome",()=>show("home")); bind("tabAnalytics",()=>show("analytics")); bind("tabSettings",()=>show("settings"));
bind("homePractice",()=>{selectedLecture="All";start("practice")}); bind("homeReview",()=>start("review",50)); bind("homeWeak",()=>show("weak")); bind("homeCustomize",()=>{$("customPanel").classList.toggle("hidden"); buildHome()}); bind("startPractice",()=>start("practice"));
bind("prev",()=>{if(idx>0){idx--;qStart=Date.now();renderQ();window.scrollTo(0,0)}}); bind("next",()=>{if(answers[idx]!==null)nextQ()}); bind("quit",()=>show("home"));
buildHome();
})();
</script>
</body>
