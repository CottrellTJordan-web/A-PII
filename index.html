opic": "Hypothalamus", "q": "The hypothalamus is part of which brain region?", "answer": "Diencephalon", "distractors": ["Telencephalon", "Metencephalon", "Myelencephalon", "Mesencephalon"], "rationale": "The hypothalamus is part of the diencephalon and is anterior/inferior to the thalamus.", "difficulty": "Tricky", "tag": "Lecture"}, {"id": "Q0017", "bank": "lecture", "lecture": "Endocrine", "subtopic": "Hypothalamus", "q": "The hypothalamus connects to the posterior pituitary through what structure?", "answer": "Infundibulum", "distractors": ["Corpus callosum", "Sella turcica", "Pars distalis", "Thyroid isthmus"], "rationale": "The infundibulum connects hypothalamus to the posterior pituitary.", "difficulty": "Tricky", "tag": "Lecture"}, {"id": "Q0018", "bank": "lecture", "lecture": "Endocrine", "subtopic": "Hypothalamus", "q": "Which structure should you identify as the stalk between hypothalamus and pituitary on a diagram?", "answer": "Infundibulum", "distractors": ["Pars intermedia", "Median eminence only", "Sella turcica", "Mammillary body"], "rationale": "Picture-style: the infundibulum/infundibular stalk is the connection between hypothalamus and pituitary.", "difficulty": "Tricky", "tag": "Lecture"}, {"id": "Q0019", "bank": "lecture", "lecture": "Endocrine", "subtopic": "Hypothalamus", "q": "Hormones synthesized in the hypothalamus can either stimulate anterior pituitary synthesis or do what?", "answer": "Be stored in the posterior pituitary for later release", "distractors": ["Be synthesized by the posterior pituitary", "Be stored in the thyroid follicles", "Enter exocrine ducts", "Convert into steroid hormones"], "rationale": "ADH and oxytocin are synthesized in hypothalamus and stored/released from posterior pituitary.", "difficulty": "Tricky", "tag": "Lecture"}, {"id": "Q0020", "bank": "lecture", "lecture": "Endocrine", "subtopic": "Endocrine Axes", "q": "An endocrine axis is composed of what three levels?", "answer": "Hypothalamic neurons, anterior pit osa", "Pars distalis", "Infundibular stalk", "Posterior lobe"], "rationale": "Pars tuberalis wraps around the infundibulum.", "difficulty": "Review Trap", "tag": "Review 50"}, {"id": "Q0086", "bank": "review", "lecture": "Review 50", "subtopic": "Pituitary Anatomy", "q": "In humans, the pars intermedia is best described as what?", "answer": "Not considered a distinct separate segment in adults", "distractors": ["The largest anterior pituitary segment", "The posterior pituitary stalk", "The same as pars nervosa", "The source of ADH"], "rationale": "In humans, pars intermedia atrophies during fetal development and is not a distinct adult segment.", "difficulty": "Review Trap", "tag": "Review 50"}, {"id": "Q0087", "bank": "review", "lecture": "Review 50", "subtopic": "Growth Hormone", "q": "Somatomedins primarily do what?", "answer": "Promote body growth by acting downstream of growth hormone", "distractors": ["Inhibit bone growth in children", "Promote glucose uptake as their main action", "Cause milk ejection", "Directly produce TSH"], "rationale": "Somatomedins/IGFs mediate growth-promoting effects of GH.", "difficulty": "Review Trap", "tag": "Review 50"}, {"id": "Q0088", "bank": "review", "lecture": "Review 50", "subtopic": "Gonadotropins", "q": "Luteinizing hormone causes which male effect?", "answer": "Testosterone synthesis", "distractors": ["Spermatogenesis directly", "Milk production", "Menstruation", "Calcitonin release"], "rationale": "LH stimulates Leydig cells for testosterone synthesis.", "difficulty": "Review Trap", "tag": "Review 50"}, {"id": "Q0089", "bank": "review", "lecture": "Review 50", "subtopic": "Gonadotropins", "q": "Follicle-stimulating hormone is most associated with which male reproductive process?", "answer": "Spermatogenesis", "distractors": ["Testosterone synthesis", "Milk ejection", "Cortisol release", "Aldosterone release"], "rationale": "FSH supports spermatogenesis.", "difficulty": "Review Trap", "tag": "Review 50"}, {"id": "Q0090", iew 50", "subtopic": "Pancreas", "q": "Which pancreatic cell type produces glucagon?", "answer": "A cells", "distractors": ["B cells", "D cells", "F cells", "Chromaffin cells"], "rationale": "Alpha/A cells produce glucagon.", "difficulty": "Review Trap", "tag": "Review 50"}, {"id": "Q0095", "bank": "review", "lecture": "Review 50", "subtopic": "Pancreas", "q": "Which pancreatic cell type produces insulin?", "answer": "B cells", "distractors": ["A cells", "D cells", "F cells", "Chromaffin cells"], "rationale": "Beta/B cells produce insulin.", "difficulty": "Review Trap", "tag": "Review 50"}, {"id": "Q0096", "bank": "review", "lecture": "Review 50", "subtopic": "Pancreas", "q": "Which pancreatic cell type produces somatostatin?", "answer": "D cells", "distractors": ["A cells", "B cells", "F cells", "G cells"], "rationale": "Delta/D cells produce somatostatin.", "difficulty": "Review Trap", "tag": "Review 50"}, {"id": "Q0097", "bank": "review", "lecture": "Review 50", "subtopic": "Pancreas", "q": "Which pancreatic cell type produces pancreatic polypeptide?", "answer": "F cells", "distractors": ["A cells", "B cells", "D cells", "Chromaffin cells"], "rationale": "F/PP cells produce pancreatic polypeptide.", "difficulty": "Review Trap", "tag": "Review 50"}, {"id": "Q0098", "bank": "review", "lecture": "Review 50", "subtopic": "GI Hormones", "q": "Which hormone is produced by G cells in the stomach?", "answer": "Gastrin", "distractors": ["Secretin", "Cholecystokinin", "GIP", "Adiponectin"], "rationale": "G cells produce gastrin.", "difficulty": "Review Trap", "tag": "Review 50"}, {"id": "Q0099", "bank": "review", "lecture": "Review 50", "subtopic": "GI Hormones", "q": "Which group is listed as stomach and small intestine amino acid hormones?", "answer": "Gastrin, secretin, cholecystokinin, and GIP", "distractors": ["Insulin, glucagon, and somatostatin", "Histamine, serotonin, and melatonin", "Aldosterone, cortisol, and DHEA", "FSH, LH, and TSH"], "rationale": "The table lists GI hormones as gastrin, secretin, CCK, and GIP.", "difficulty": "Review Trap", "tag": "Review 50"}, {"id": "Q0100", "bank": "review", "lecture": "Review 50", "subtopic": "Picture ID", "q": "On a sagittal brain/pituitary image, which structure is located anterior and inferior to the thalamus and controls the pituitary?", "answer": "Hypothalamus", "distractors": ["Pineal gland", "Corpus callosum", "Cerebral aqueduct", "Fourth ventricle"], "rationale": "Picture-style: hypothalamus sits below/anterior to thalamus and regulates the pituitary.", "difficulty": "Review Trap", "tag": "Review 50"}, {"id": "Q0101", "bank": "review", "lecture": "Review 50", "subtopic": "Picture ID", "q": "On a pituitary image, which label corresponds to the posterior pituitary lobe?", "answer": "Pars nervosa", "distractors": ["Pars distalis", "Pars tuberalis", "Pars intermedia", "Sella turcica"], "rationale": "Posterior pituitary is pars nervosa/neurohypophysis.", "difficulty": "Review Trap", "tag": "Review 50"}, {"id": "Q0102", "bank": "review", "lecture": "Review 50", "subtopic": "Picture ID", "q": "On an anterior pituitary image, which label corresponds to the largest distal glandular part?", "answer": "Pars distalis", "distractors": ["Pars nervosa", "Infundibular stalk", "Median eminence", "Mammillary body"], "rationale": "Pars distalis is the largest anterior pituitary portion.", "difficulty": "Review Trap", "tag": "Review 50"}, {"id": "Q0103", "bank": "review", "lecture": "Review 50", "subtopic": "Picture ID", "q": "On a hypophyseal portal diagram, what vessel group connects hypothalamus to anterior pituitary?", "answer": "Hypophyseal portal veins", "distractors": ["Hypothalamohypophyseal tract", "Inferior hypophyseal artery only", "Cerebral aqueduct", "Short portal vessel to posterior pituitary only"], "rationale": "Anterior pituitary regulation occurs via portal veins.", "difficulty": "Review Trap", "tag": "Review 50"}, {"id": "Q0104", "bank": "review", "lecture": "Review 50", "subtopic": "Picture ID", "q": "On a posterior pituitary tract diagram, yellow neuron axons descending from hypothalamus represent what?", "answer": "Hypothalamohypophyseal tract", "distractors": ["Hypophyseal portal veins", "Pars distalis capillaries", "Thyroid follicles", "Adrenal medulla chromaffin cords"], "rationale": "Posterior pituitary hormones travel down axons through hypothalamohypophyseal tracts.", "difficulty": "Review Trap", "tag": "Review 50"}, {"id": "Q0105", "bank": "review", "lecture": "Review 50", "subtopic": "Review Trap", "q": "Which answer is best if asked what hormone is produced in the neurohypophysis?", "answer": "None of the above", "distractors": ["ADH", "Vasopressin", "Oxytocin", "All of the above"], "rationale": "He used this exact trap style: posterior pituitary stores/releases ADH and oxytocin; production occurs in hypothalamus.", "difficulty": "Review Trap", "tag": "Review 50"}, {"id": "Q0106", "bank": "review", "lecture": "Review 50", "subtopic": "Review Trap", "q": "If the question asks for the bone containing the pituitary depression, what is the correct answer?", "answer": "Sphenoid", "distractors": ["Sella turcica", "Ethmoid", "Palatine", "Parietal"], "rationale": "Sella turcica is the depression, but the bone is sphenoid.", "difficulty": "Review Trap", "tag": "Review 50"}, {"id": "Q0107", "bank": "review", "lecture": "Review 50", "subtopic": "Review Trap", "q": "If the question asks for the depression holding the pituitary, what is the correct answer?", "answer": "Sella turcica", "distractors": ["Sphenoid", "Ethmoid", "Hypophyseal fossa only", "Infundibulum"], "rationale": "If wording asks depression, choose sella turcica; if wording asks bone, choose sphenoid.", "difficulty": "Review Trap", "tag": "Review 50"}, {"id": "Q0108", "bank": "review", "lecture": "Review 50", "subtopic": "Endocrine vs Nervous", "q": "Which feature best distinguishes typical endocrine signaling from nervous signaling?", "answer": "Hormones travel through blood to distant target cells", "distractors": ["Neurotransmitters travel in blood to distant targets", "Endocrine responses always occur in milliseconds", "Endocrine cells only act on muscle cells", "Nervous signaling lasts seconds to days"], "rationale": "Endocrine signaling usually uses hormones carried in blood to distant targets, while nervous signaling occurs near the synapse and is faster/shorter.", "difficulty": "Review Trap", "tag": "Review 50"}, {"id": "Q0109", "bank": "review", "lecture": "Review 50", "subtopic": "Endocrine vs Exocrine", "q": "An endocrine gland secretes its product into which location first?", "answer": "Interstitial fluid and blood surrounding secretory cells", "distractors": ["A duct leading to the skin surface", "The lumen of an organ only", "Synaptic clefts only", "Sebaceous ducts"], "rationale": "Endocrine means secretion into interstitial fluid/blood; exocrine glands secrete into ducts.", "difficulty": "Review Trap", "tag": "Review 50"}, {"id": "Q0110", "bank": "review", "lecture": "Review 50", "subtopic": "Endocrine vs Exocrine", "q": "Which gland listed is exocrine rather than endocrine?", "answer": "Sudoriferous gland", "distractors": ["Anterior pituitary", "Adrenal cortex", "Parathyroid gland", "Thyroid follicular cell"], "rationale": "Sudoriferous sweat glands release through ducts, making them exocrine.", "difficulty": "Review Trap", "tag": "Review 50"}, {"id": "Q0111", "bank": "review", "lecture": "Review 50", "subtopic": "Receptor Regulation", "q": "Too much circulating hormone causes target cells to become less sensitive primarily through what mechanism?", "answer": "Receptor down-regulation", "distractors": ["Receptor up-regulation", "Increased receptor synthesis", "Increased hormone uptake", "Increased target-cell receptor number"], "rationale": "Down-regulation reduces receptor number when hormone concentration is excessive.", "difficulty": "Review Trap", "tag": "Review 50"}, {"id": "Q0112", "bank": "review", "lecture": "R ": "Hormone Transport", "q": "Water-soluble hormones are usually transported in blood how?", "answer": "Free and unbound", "distractors": ["Bound to thyroxine-binding globulin", "Bound only to albumin", "Inside erythrocytes", "Only through portal veins"], "rationale": "Water-soluble hormones generally do not require carrier proteins.", "difficulty": "Review Trap", "tag": "Review 50"}, {"id": "Q0117", "bank": "review", "lecture": "Review 50", "subtopic": "Feedback", "q": "Which process is the best example of positive feedback from the lecture?", "answer": "Cervical dilation stimulating oxytocin release and stronger uterine contractions", "distractors": ["High thyroid hormone suppressing TSH", "High cortisol suppressing ACTH", "High hormone reducing receptor number", "Low hormone increasing receptor number"], "rationale": "Oxytocin during labor reinforces the change, making it positive feedback.", "difficulty": "Review Trap", "tag": "Review 50"}, {"id": "Q0118", "bank": "review", "lecture": "Review 50", "subtopic": "Control of Secretion", "q": "Which is an example of hormone secretion controlled by chemical changes in blood?", "answer": "Blood calcium regulating parathyroid hormone secretion", "distractors": ["Nerve impulses to adrenal medulla", "ACTH stimulating cortisol", "TRH stimulating TSH", "Oxytocin stimulating uterine contractions"], "rationale": "Blood Ca2+ is a chemical change that directly regulates PTH secretion.", "difficulty": "Review Trap", "tag": "Review 50"}, {"id": "Q0119", "bank": "review", "lecture": "Review 50", "subtopic": "Control of Secretion", "q": "Which is an example of hormone secretion controlled by the nervous system?", "answer": "Nerve impulses to adrenal medullae regulating epinephrine release", "distractors": ["Blood calcium regulating PTH", "ACTH stimulating cortisol", "TSH stimulating T3/T4", "Gastrin release from G cells"], "rationale": "The adrenal medulla receives neural input that regulates catecholamine release.", "difficulty": function renderResume(){var s=load("active",null), box=qs("resumeBox"); if(!s||!s.quiz||!s.quiz.length){box.classList.add("hidden"); return;} box.classList.remove("hidden"); box.innerHTML="<div class='label'>Resume Session</div><div class='small'>Question "+((s.idx||0)+1)+" / "+s.quiz.length+"</div><div class='nav'><button class='primaryBtn' data-action='resume'>Resume</button><button class='secondary' data-action='discard'>Discard</button></div>";}
function lecturePool(){return selectedLecture==="All"?LECTURE:LECTURE.filter(function(q){return q.lecture===selectedLecture;});}
function weakPool(){var miss=load("miss",{}), weak=load("weak",{}), prog=load("prog",{}); var keys=Object.keys(prog).filter(function(x){return prog[x].total>=2 && prog[x].right/prog[x].total<.8;}); var arr=ALL.filter(function(q){return miss[q.id]||weak[q.id]||keys.indexOf(q.lecture+"|"+q.subtopic)>=0;}); return arr.length?arr:LECTURE;}
function makeQ(q){var opts=shuffle([q.answer].concat(q.distractors)).slice(0,5); if(opts.indexOf(q.answer)<0)opts[0]=q.answer; opts=shuffle(opts); var n={}; Object.keys(q).forEach(function(k){n[k]=q[k];}); n.options=opts; n.correct=opts.indexOf(q.answer); return n;}
function saveActive(){if(quiz&&quiz.length)save("active",{quiz:quiz,idx:idx,answers:answers,conf:conf,saved:saved,mode:mode,started:started,selectedLecture:selectedLecture,selectedCount:selectedCount});}
function restoreActive(){var s=load("active",null); if(!s)return; quiz=s.quiz; idx=s.idx||0; answers=s.answers||[]; conf=s.conf||[]; saved=s.saved||[]; mode=s.mode||"practice"; started=s.started||Date.now(); qStarted=Date.now(); clearInterval(timer); timer=setInterval(function(){qs("clock").textContent=fmt((Date.now()-started)/1000);},500); setScreen("quiz"); renderQuestion();}

function startTopic(key){
  var parts=key.split("|"), lec=parts[0], sub=parts.slice(1).join("|");
  var pool=ALL.filter(function(q){return q.lecture===lec && q.subtopic===sub;});
  if(!pool.length){alert("No questions for this topic.");return;}
  mode="topic"; var n=Math.min(selectedCount||20,pool.length);
  quiz=shuffle(pool).slice(0,n).map(makeQ); idx=0; answers=new Array(n).fill(null); conf=new Array(n).fill(""); saved=new Array(n).fill(false);
  started=Date.now(); qStarted=Date.now(); clearInterval(timer);
  timer=setInterval(function(){qs("clock").textContent=fmt((Date.now()-started)/1000);},500);
  saveActive(); setScreen("quiz"); renderQuestion();
}

function start(m,count){mode=m; var pool=m==="review"?REVIEW:m==="weak"?weakPool():lecturePool(); var flagged=load("flagged",{}); pool=pool.filter(function(q){return !flagged[q.id];}); if(avoidRepeats&&m==="practice"){var seen=load("seen",{})[selectedLecture]||[]; var unseen=pool.filter(function(q){return seen.indexOf(q.id)<0;}); if(unseen.length)pool=unseen;} if(!pool.length){alert("No questions available");return;} var n=Math.min(count||selectedCount,pool.length); quiz=shuffle(pool).slice(0,n).map(makeQ); idx=0; answers=new Array(n).fill(null); conf=new Array(n).fill(""); saved=new Array(n).fill(false); started=Date.now(); qStarted=Date.now(); clearInterval(timer); timer=setInterval(function(){qs("clock").textContent=fmt((Date.now()-started)/1000);},500); saveActive(); setScreen("quiz"); renderQuestion();}
function renderQuestion(){var q=quiz[idx], chosen=answers[idx], answered=chosen!==null, reveal=answered&&!(mode==="review"&&hideReview); qs("bar").style.width=((idx+1)/quiz.length*100)+"%"; qs("qnum").textContent="Question "+(idx+1)+" / "+quiz.length; qs("score").textContent="Score: "+answers.filter(function(a,i){return a===quiz[i].correct;}).length; var h="<span class='tag'>"+esc(q.lecture)+" · "+esc(q.subtopic)+"</span><div class='qtext'>"+esc(q.q)+"</div>"; q.options.forEach(function(op,i){var cls="option"; if(reveal)cls+=i===q.correct?" correct":i===chosen?" wrong":" dim"; h+="<button class='"+cls+"' "+(answered?"disabled":"")+" data-choice='"+i+"'><span class='letter'>"+letters[i]+"</span><span>"+esc(op)+"</span></button>";}); if(answered&&!reveal)h+="<div class='explain'><strong>Answer locked.</strong><br>Answers are hidden in Review mode. Change this in Settings.<div class='confrow'><button class='confbtn' data-conf='knew'>I knew that</button><button class='confbtn' data-conf='guessed'>I guessed</button><button class='confbtn' data-conf='dontknow'>I don’t fucking know</button><button class='confbtn' data-conf='tricked'>I got tricked</button></div></div>"; if(reveal)h+="<div class='explain'><strong>"+(chosen===q.correct?"Correct.":"Correct answer: "+letters[q.correct]+" — "+esc(q.answer))+"</strong><br><br><strong>Why:</strong><br>"+esc(q.rationale)+"<div class='confrow'><button class='confbtn' data-conf='knew'>I knew that</button><button class='confbtn' data-conf='guessed'>I guessed</button><button class='confbtn' data-conf='dontknow'>I don’t fucking know</button><button class='confbtn' data-conf='tricked'>I got tricked</button></div><button class='flagbtn' data-flag='1'>Flag bad question / remove</button></div>"; qs("qslot").innerHTML=h; document.querySelectorAll("[data-choice]").forEach(function(b){b.onclick=function(){answers[idx]=Number(b.getAttribute("data-choice")); if(!conf[idx])conf[idx]="guessed"; saveAnswer(idx); renderQuestion(); saveActive(); haptic();};}); document.querySelectorAll("[data-conf]").forEach(function(b){if(conf[idx]===b.getAttribute("data-conf"))b.classList.add("selected"); b.onclick=function(){conf[idx]=b.getAttribute("data-conf"); if(conf[idx]==="guessed"||conf[idx]==="dontknow"||conf[idx]==="tricked"){var wk=load("weak",{}); wk[q.id]=true; save("weak",wk);} saveConf(idx); updateHeader(); saveActive(); haptic(); if(autoAdvance)setTimeout(nextQuestion,250); else renderQuestion();};}); document.querySelectorAll("[data-flag]").forEach(function(b){b.onclick=function(){var fl=load("flagged",{}); fl[q.id]=true; save("flagged",fl); b.textContent="Flagged"; b.disabled=true;};}); qs("next").disabled=!answered; qs("prev").disabled=idx===0; qs("next").textContent=idx===quiz.length-1?"Finish":"Next";}
function saveAnswer(i){if(saved[i]||answers[i]===null)return; var q=quiz[i], ok=answers[i]===q.correct, t=Math.max(1,Math.round((Date.now()-qStarted)/1000)); var prog=load("prog",{}), miss=load("miss",{}), hist=load("hist",[]), seen=load("seen",{}), dist=load("distractors",{}); var key=q.lecture+"|"+q.subtopic; if(!prog[key])prog[key]={lecture:q.lecture,subtopic:q.subtopic,right:0,total:0,time:0,misses:0,missTime:0,tricked:0}; prog[key].total++; prog[key].time+=t; if(ok){prog[key].right++; delete miss[q.id];} else {miss[q.id]=true; prog[key].misses++; prog[key].missTime+=t; var dk=q.subtopic+" → "+q.options[answers[i]]; if(!dist[dk])dist[dk]={subtopic:q.subtopic,answer:q.options[answers[i]],correct:q.answer,count:0}; dist[dk].count++;} if(!seen[selectedLecture])seen[selectedLecture]=[]; if(seen[selectedLecture].indexOf(q.id)<0)seen[selectedLecture].push(q.id); hist.push({date:Date.now(),right:ok?1:0,time:t,lecture:q.lecture,subtopic:q.subtopic,selected:q.options[answers[i]],correct:q.answer,conf:conf[i]}); save("prog",prog); save("miss",miss); save("hist",hist.slice(-1000)); save("seen",seen); save("distractors",dist); saved[i]=true; updateHeader();}
function saveConf(i){var q=quiz[i], ok=answers[i]===q.correct; var c=load("conf",{knew:{r:0,t:0},guessed:{r:0,t:0},dontknow:{r:0,t:0},tricked:{r:0,t:0}}); var x=conf[i]; if(c[x]){c[x].t++; if(ok)c[x].r++;} if(x==="tricked"){var prog=load("prog",{}), key=q.lecture+"|"+q.subtopic; if(prog[key]){prog[key].tricked=(prog[key].tricked||0)+1; save("prog",prog);}} save("conf",c);}
function nextQuestion(){if(idx<quiz.length-1){idx++; qStarted=Date.now(); renderQuestion(); saveActive(); window.scrollTo(0,0);} else finish();}
function finish(){clearInterval(timer); remove("active"); var right=answers.filter(function(a,i){return a===quiz[i].correct;}).length; var pct=Math.round(right/quiz.length*100); qs("results").innerHTML="<section class='card'><div class='label'>Results</div><div class='result'>"+pct+"%</div><div class='small'>"+right+" / "+quiz.length+" correct</div><div class='nav'><button class='secondary' data-action='home'>Home</button><button class='primaryBtn' data-action='weak'>Weak Areas</button></div></section>"; setScreen("results");}
function renderWeak(){var arr=weakPool(); qs("weak").innerHTML="<section class='card'><div class='label'>Weak Areas</div><div class='small'>Guessed, tricked, missed, and low-performing topics.</div><button class='primaryBtn' data-action='weakStart' style='width:100%;margin-top:12px'>Start Weak Quiz</button></section><section class='card'><div class='label'>Weak Pool</div><table>"+(arr.slice(0,35).map(function(q){return "<tr><td><strong>"+esc(q.subtopic)+"</strong><br><span class='small'>"+esc(q.q)+"</span></td></tr>";}).join("")||"<tr><td class='small'>No weak questions yet.</td></tr>")+"</table></section>";}

function pct(x){return x.total?Math.round(x.right/x.total*100):0;}
function getTopicRows(){
  return stat().p.map(function(x){
    var p=pct(x);
    var avg=x.total?Math.round((x.time||0)/x.total):0;
    return {lecture:x.lecture,subtopic:x.subtopic,right:x.right,total:x.total,pct:p,avg:avg,misses:x.misses||0,tricked:x.tricked||0,key:x.lecture+"|"+x.subtopic};
  });
}
function adaptivePool(){
  var prog=load("prog",{}), miss=load("miss",{}), weak=load("weak",{}), flagged=load("flagged",{});
  var lowKeys=Object.keys(prog).filter(function(k){return prog[k].total>=2 && prog[k].right/prog[k].total<.82;});
  var scored=[];
  ALL.forEach(function(q){
    if(flagged[q.id]) return;
    var score=1;
    var k=q.lecture+"|"+q.subtopic;
    if(miss[q.id]) score+=6;
    if(weak[q.id]) score+=5;
    if(lowKeys.indexOf(k)>=0) score+=4;
    if(prog[k] && prog[k].tricked) score+=Math.min(5,prog[k].tricked);
    scored.push({q:q,score:score});
  });
  scored.sort(function(a,b){return b.score-a.score || Math.random()-.5;});
  return scored.map(function(x){return x.q;});
}
function startAdaptive(){
  var pool=adaptivePool();
  if(!pool.length){alert("No questions available.");return;}
  mode="adaptive";
  var n=Math.min(selectedCount||20,pool.length);
  quiz=pool.slice(0,n).map(makeQ);
  idx=0; answers=new Array(n).fill(null); conf=new Array(n).fill(""); saved=new Array(n).fill(false);
  started=Date.now(); qStarted=Date.now(); clearInterval(timer);
  timer=setInterval(function(){qs("clock").textContent=fmt((Date.now()-started)/1000);},500);
  saveActive(); setScreen("quiz"); renderQuestion();
}
function renderSmartHome(){
  var box=qs("smartHomeContent"); if(!box) return;
  var s=stat(), topics=getTopicRows();
  if(!s.total){box.innerHTML="Complete questions to unlock adaptive recommendations.";return;}
  var worst=topics.slice().filter(function(x){return x.total>=2;}).sort(function(a,b){return a.pct-b.pct;})[0];
  var best=topics.slice().filter(function(x){return x.total>=2;}).sort(function(a,b){return b.pct-a.pct;})[0];
  var trick=topics.slice().sort(function(a,b){return b.tricked-a.tricked;})[0];
  var rec = s.prep>=85 ? "Run Review 50, then repair any guessed/tricked misses." : (worst ? "Start with "+worst.subtopic+" before doing another Review 50." : "Keep building data with Practice All.");
  box.innerHTML="<div class='recommendBox'><strong>Recommended next:</strong><br>"+esc(rec)+"</div><div class='leaderGrid' style='margin-top:10px'>"+
    "<div class='leaderCard'><span class='small'>Weakest</span><strong>"+esc(worst?worst.subtopic:"—")+"</strong><span class='small'>"+(worst?worst.pct+"%":"No data")+"</span></div>"+
    "<div class='leaderCard'><span class='small'>Strongest</span><strong>"+esc(best?best.subtopic:"—")+"</strong><span class='small'>"+(best?best.pct+"%":"No data")+"</span></div>"+
    "<div class='leaderCard'><span class='small'>Most Tricked</span><strong>"+esc(trick&&trick.tricked?trick.subtopic:"—")+"</strong><span class='small'>"+(trick&&trick.tricked?trick.tricked+"x":"No data")+"</span></div>"+
    "<div class='leaderCard'><span class='small'>Adaptive</span><strong>Smart Mix</strong><button class='launchBtn' data-action='adaptive'>Start Adaptive</button></div>"+
    "</div>";
}

function renderAnalytics(){
var s=stat(), hist=load("hist",[]), avg=hist.length?Math.round(hist.reduce(function(a,b){return a+(b.time||0);},0)/hist.length):0,
misses=hist.filter(function(x){return !x.right;}), correct=hist.filter(function(x){return x.right;}),
avgMiss=misses.length?Math.round(misses.reduce(function(a,b){return a+(b.time||0);},0)/misses.length):0,
avgRight=correct.length?Math.round(correct.reduce(function(a,b){return a+(b.time||0);},0)/correct.length):0,
confs=load("conf",{knew:{r:0,t:0},guessed:{r:0,t:0},dontknow:{r:0,t:0},tricked:{r:0,t:0}}),
dist=Object.values(load("distractors",{})).sort(function(a,b){return b.count-a.count;}).slice(0,8),
topics=getTopicRows(), eligible=topics.filter(function(x){return x.total>=2;});
function row(k,l){var x=confs[k]||{r:0,t:0}; return "<tr><td><strong>"+l+"</strong></td><td>"+(x.t?Math.round(x.r/x.t*100)+"%":"—")+"<br><span class='small'>"+x.r+"/"+x.t+"</span></td></tr>";}
var low=eligible.slice().sort(function(a,b){return a.pct-b.pct;}).slice(0,10);
var high=eligible.slice().sort(function(a,b){return b.pct-a.pct;}).slice(0,10);
var tricked=topics.slice().sort(function(a,b){return b.tricked-a.tricked;}).slice(0,8);
var slow=topics.slice().filter(function(x){return x.total>=2;}).sort(function(a,b){return b.avg-a.avg;}).slice(0,8);
function topicRows(arr,btn){
 return arr.map(function(x){return "<tr><td><strong>"+esc(x.subtopic)+"</strong><br><span class='small'>"+esc(x.lecture)+" · avg "+x.avg+"s · tricked "+x.tricked+"</span><div class='heatbar'><span style='width:"+Math.max(3,x.pct)+"%'></span></div>"+(btn?"<button class='launchBtn' data-topic='"+esc(x.key)+"'>Quiz this topic</button>":"")+"</td><td>"+x.pct+"%<br><span class='small'>"+x.right+"/"+x.total+"</span></td></tr>";}).join("") || "<tr><td class='small'>No data yet.</td><td></td></tr>";
}
var drows=dist.map(function(x){return "<tr><td><strong>"+esc(x.subtopic)+"</strong><br><span class='small'>Picked: "+esc(x.answer)+"<br>Correct: "+esc(x.correct)+"</span></td><td>"+x.count+"x</td></tr>";}).join("")||"<tr><td class='small'>No distractor patterns yet.</td><td></td></tr>";
var rec=s.prep>=85?"You are in review-and-polish mode. Do Review 50, then Weak Areas.":(low[0]?"Highest yield next step: drill "+low[0].subtopic+".":"Build more data with Practice All.");
qs("analytics").innerHTML="<section class='card'><div class='label'>Command Center</div><div class='kpi'><div class='box green'><span class='small'>Prepared</span><strong>"+s.prep+"%</strong></div><div class='box'><span class='small'>Accuracy</span><strong>"+s.acc+"%</strong></div><div class='box'><span class='small'>Answered</span><strong>"+s.total+"</strong></div></div><div class='recommendBox'><strong>Recommendation:</strong><br>"+esc(rec)+"</div></section>"+
"<section class='card'><div class='label'>Timing</div><div class='kpi'><div class='box'><span class='small'>Avg / Q</span><strong>"+avg+"s</strong></div><div class='box'><span class='small'>Avg Correct</span><strong>"+avgRight+"s</strong></div><div class='box red'><span class='small'>Avg Missed</span><strong>"+avgMiss+"s</strong></div></div></section>"+
"<section class='card'><div class='label'>Confidence</div><table>"+row("knew","I knew that")+row("guessed","I guessed")+row("dontknow","I don’t fucking know")+row("tricked","I got tricked")+"</table></section>"+
"<section class='card'><div class='label'>Topic Mastery Leaderboard</div><div class='leaderGrid'><div><div class='label'>Lowest</div><table>"+topicRows(low,true)+"</table></div><div><div class='label'>Highest</div><table>"+topicRows(high,false)+"</table></div></div></section>"+
"<section class='card'><div class='label'>Advanced Insights</div><div class='leaderGrid'><div><div class='label'>Most Tricked</div><table>"+topicRows(tricked,false)+"</table></div><div><div class='label'>Slowest Topics</div><table>"+topicRows(slow,false)+"</table></div></div></section>"+
"<section class='card'><div class='label'>Distractor Patterns</div><table>"+drows+"</table></section>";
document.querySelectorAll("[data-topic]").forEach(function(b){b.onclick=function(){startTopic(b.getAttribute("data-topic"));};});
}

function renderSettings(){qs("settings").innerHTML="<section class='card'><div class='label'>Settings</div><button class='secondary' data-action='toggleAuto' style='width:100%'>Auto Advance: "+(autoAdvance?"On":"Off")+"</button><button class='secondary' data-action='toggleHide' style='width:100%;margin-top:10px'>Hide Review Answers: "+(hideReview?"On":"Off")+"</button><button class='secondary' data-action='toggleRepeats' style='width:100%;margin-top:10px'>Prioritize Unseen: "+(avoidRepeats?"On":"Off")+"</button><button class='danger' data-action='reset' style='width:100%;margin-top:10px'>Reset Progress</button></section>";}
function openNavigator(){var h="<div class='jumpPanel'><div class='label'>Question Navigator</div><div class='small'>Green = correct · red = missed · yellow = guessed/tricked/don’t know</div><div class='jumpGrid'>"; quiz.forEach(function(q,i){var cls=answers[i]===null?"":answers[i]===q.correct?"done":"bad"; if(conf[i]==="guessed"||conf[i]==="dontknow"||conf[i]==="tricked")cls="warn"; h+="<button class='jumpBtn "+cls+"' data-jump='"+i+"'>"+(i+1)+"</button>";}); h+="</div><button class='secondary' data-action='closeJump' style='width:100%;margin-top:14px'>Close</button></div>"; qs("jumpOverlay").innerHTML=h; qs("jumpOverlay").classList.remove("hidden"); document.querySelectorAll("[data-jump]").forEach(function(b){b.onclick=function(){idx=Number(b.getAttribute("data-jump")); qStarted=Date.now(); qs("jumpOverlay").classList.add("hidden"); renderQuestion(); saveActive();};});}
document.addEventListener("click",function(e){var qn=e.target.closest("#qnum"); if(qn){openNavigator(); return;} var b=e.target.closest("[data-action]"); if(!b)return; var a=b.getAttribute("data-action"); if(a==="home")setScreen("home"); if(a==="analytics")setScreen("analytics"); if(a==="settings")setScreen("settings"); if(a==="practice"){selectedLecture="All";start("practice");} if(a==="review")start("review",50); if(a==="adaptive")startAdaptive(); if(a==="weak")setScreen("weak"); if(a==="weakStart")start("weak"); if(a==="custom"){qs("custom").classList.toggle("hidden"); buildHome();} if(a==="startCustom")start("practice"); if(a==="prev"&&idx>0){idx--;qStarted=Date.now();renderQuestion();saveActive();} if(a==="next"&&answers[idx]!==null)nextQuestion(); if(a==="quit")setScreen("home"); if(a==="resume")restoreActive(); if(a==="discard"){remove("active"); renderResume();} if(a==="closeJump")qs("jumpOverlay").classList.add("hidden"); if(a==="toggleAuto"){autoAdvance=!autoAdvance; save("autoAdvance",autoAdvance); renderSettings();} if(a==="toggleHide"){hideReview=!hideReview; save("hideReview",hideReview); renderSettings();} if(a==="toggleRepeats"){avoidRepeats=!avoidRepeats; save("avoidRepeats",avoidRepeats); renderSettings();} if(a==="reset"){if(confirm("Reset all progress?")){["prog","miss","weak","hist","conf","flagged","distractors","seen","active"].forEach(remove); updateHeader(); renderSettings();}}});
buildHome();
}catch(e){showErr(e);}
})();
</script>
