function esc(s){return String(s).replace(/[&<>"']/g,function(m){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m];});}
function getStore(k,f){try{var v=localStorage.getItem(k);return v?JSON.parse(v):f;}catch(e){return f;}}
function setStore(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function haptic(ms){try{if(navigator.vibrate)navigator.vibrate(ms||10);}catch(e){}}
function lecturePool(){return selectedLecture==="All"?LECTURE:LECTURE.filter(function(q){return q.lecture===selectedLecture;});}
function filterFlagged(pool){var f=getStore("bc_flagged_v3",{});return pool.filter(function(q){return !f[q.id];});}
function seenKey(mode){return mode==="review"?"review100":mode==="focused"?focusedSubtopic.lecture+"|"+focusedSubtopic.subtopic:selectedLecture;}
function filterSeen(pool,mode){if(!avoidRepeats||mode==="weak"||mode==="missed")return pool;var seen=getStore("bc_seen_v3",{}),key=seenKey(mode),list=seen[key]||[];var unseen=pool.filter(function(q){return list.indexOf(q.id)<0;});return unseen.length?unseen:pool;}
function makeQuestion(q){var opts=shuffle([q.answer].concat(q.distractors)).slice(0,5);if(opts.indexOf(q.answer)<0)opts[0]=q.answer;opts=shuffle(opts);var c={};for(var k in q)c[k]=q[k];c.options=opts;c.correct=opts.indexOf(q.answer);return c;}

function stats(){
  var p=Object.values(getStore("bc_prog_v3",{}));
  var total=p.reduce(function(a,b){return a+b.total;},0), right=p.reduce(function(a,b){return a+b.right;},0);
  var acc=total?Math.round(right/total*100):0;
  var eligible=p.filter(function(x){return x.total>=2;});
  var weakest=eligible.slice().sort(function(a,b){return (a.right/a.total)-(b.right/b.total);})[0];
  var strongest=eligible.slice().sort(function(a,b){return (b.right/b.total)-(a.right/a.total);})[0];
  var miss=Object.keys(getStore("bc_miss_v3",{})).length;
  var noClue=Object.keys(getStore("bc_noclue_v3",{})).length;
  var penalty=Math.min(15,Math.round((miss+noClue)/5));
  var readiness=total?Math.max(0,Math.min(100,acc-penalty)):0;
  return {p:p,total:total,right:right,acc:acc,weakest:weakest,strongest:strongest,miss:miss,noClue:noClue,readiness:readiness};
}
function updateHero(){
  var s=stats();
  var prep=el("preparedMetric"), weak=el("weakMetric");
  var preparedness = s.total ? s.readiness : 0;
  var weakTopics = s.p ? s.p.filter(function(x){return x.total>=2 && (x.right/x.total)<0.80;}).length : 0;
  var weakCount = s.miss + s.noClue + weakTopics;
  if(prep) prep.innerHTML="<strong>"+preparedness+"%</strong><span> Prepared</span>";
  if(weak) weak.innerHTML="<strong>"+(weakCount>0?weakCount:"0")+"</strong><span> Weak</span>";
}

function buildHome(){
  updateHero();
  var sHome=stats();
  var weakTopicsHome=sHome.p ? sHome.p.filter(function(x){return x.total>=2 && (x.right/x.total)<0.80;}).length : 0;
  var weakCountHome=sHome.miss+sHome.noClue+weakTopicsHome;
  if(el("homeAnswered")) el("homeAnswered").textContent=sHome.total;
  if(el("homeAccuracy")) el("homeAccuracy").textContent=(sHome.total?sHome.acc:0)+"%";
  if(el("homeWeakCount")) el("homeWeakCount").textContent=weakCountHome;

  var lectures=["All"];
  LECTURE.forEach(function(q){
    if(lectures.indexOf(q.lecture)<0) lectures.push(q.lecture);
  });

  var lg=el("lectureGrid");
  if(lg){
    lg.innerHTML="";
    lectures.forEach(function(name){
      var count=name==="All"?LECTURE.length:LECTURE.filter(function(q){return q.lecture===name;}).length;
      var b=document.createElement("button");
      b.className="tile"+(name===selectedLecture?" selected":"");
      b.innerHTML="<strong>"+esc(name)+"</strong><br><span class='small'>"+count+" questions</span>";
      b.onclick=function(){selectedLecture=name;haptic();buildHome();};
      lg.appendChild(b);
    });
  }

  var wheel=el("countWheel"), num=el("countNumber"), hint=el("countHint");
  if(wheel && num){
    wheel.min=1; wheel.max=100; num.min=1; num.max=100;
    if(selectedCount<1) selectedCount=1;
    if(selectedCount>100) selectedCount=100;
    wheel.value=selectedCount; num.value=selectedCount;
    if(hint) hint.textContent=selectedCount+" question"+(selectedCount===1?"":"s")+" selected";
    wheel.oninput=function(){
      selectedCount=Number(wheel.value);
      num.value=selectedCount;
      if(hint) hint.textContent=selectedCount+" question"+(selectedCount===1?"":"s")+" selected";
    };
    num.oninput=function(){
      var v=Math.max(1,Math.min(100,Number(num.value)||1));
      selectedCount=v;
      wheel.value=v;
      if(hint) hint.textContent=v+" question"+(v===1?"":"s")+" selected";
    };
  }

  maybeShowResume();
}

function weakPool(){
  var prog=getStore("bc_prog_v3",{}), miss=getStore("bc_miss_v3",{}), no=getStore("bc_noclue_v3",{});
  var weakTopics=Object.keys(prog).filter(function(k){var p=prog[k];return p.total>=2&&(p.right/p.total)<0.80;});
  var arr=[], seen={};
  ALL.forEach(function(q){if(miss[q.id]||no[q.id]||weakTopics.indexOf(q.lecture+"|"+q.subtopic)>=0){if(!seen[q.id]){seen[q.id]=true;arr.push(q);}}});
  return filterFlagged(arr.length?arr:lecturePool());
}

}

function start(mode,countOverride){
  currentMode=mode; silentExam=(mode==="review"&&hideExamAnswers);
  var pool=mode==="review"?REVIEW:mode==="weak"?weakPool():mode==="focused"?focusedPool():lecturePool();
  pool=filterFlagged(pool); pool=filterSeen(pool,mode);
  if(!pool.length){alert("No questions available here yet.");return;}
  var count=countOverride||(mode==="review"?Math.min(50,pool.length):Math.min(selectedCount,pool.length));
  quiz=shuffle(pool).slice(0,count).map(makeQuestion); idx=0; answers=new Array(quiz.length).fill(null); confidence=new Array(quiz.length).fill("unset"); savedQuestions=new Array(quiz.length).fill(false);
  startTime=Date.now();questionStartTime=Date.now();clearInterval(timerHandle);timerHandle=setInterval(function(){el("timer").textContent=fmt(Math.floor((Date.now()-startTime)/1000));},500);
  saveActiveSession(); show("quiz"); renderQuestion();
}


function updateSavedConfidence(i,newConf){
  if(!savedQuestions[i]) return;
  var q=quiz[i], ok=answers[i]===q.correct;
  var confStats=getStore("bc_conf_v3",{knew:{right:0,total:0},guessed:{right:0,total:0},dontknow:{right:0,total:0},tricked:{right:0,total:0}});
  // We intentionally do not subtract the default prior confidence because older sessions may not have granular records.
  // Confidence analytics from this point forward track all selected labels.
  if(confStats[newConf]){
    confStats[newConf].total++;
    if(ok) confStats[newConf].right++;
    setStore("bc_conf_v3",confStats);
  }
  if(newConf==="guessed" || newConf==="dontknow" || newConf==="tricked"){
    var no=getStore("bc_noclue_v3",{});
    no[q.id]=true;
    setStore("bc_noclue_v3",no);
  }
  updateHero();
}

function saveAnsweredQuestion(i){
  if(savedQuestions[i] || answers[i]===null) return;
  var q=quiz[i], ok=answers[i]===q.correct;
  var elapsedQ=Math.max(1,Math.round((Date.now()-questionStartTime)/1000));
  var selectedText=q.options[answers[i]];
  var correctText=q.options[q.correct];
  var prog=getStore("bc_prog_v3",{}), miss=getStore("bc_miss_v3",{}), no=getStore("bc_noclue_v3",{}), seen=getStore("bc_seen_v3",{}), hist=getStore("bc_history_v3",[]);
  var distract=getStore("bc_distractors_v3",{});
  var trickStats=getStore("bc_trick_v3",{fallen:0,total:0});
  var confStats=getStore("bc_conf_v3",{knew:{right:0,total:0},guessed:{right:0,total:0},dontknow:{right:0,total:0},tricked:{right:0,total:0}});
  var keySeen=seenKey(currentMode); if(!seen[keySeen]) seen[keySeen]=[];
  if(seen[keySeen].indexOf(q.id)<0) seen[keySeen].push(q.id);
  var key=q.lecture+"|"+q.subtopic;
  if(!prog[key]) prog[key]={lecture:q.lecture,subtopic:q.subtopic,right:0,total:0,time:0,missTime:0,misses:0,tricked:0};
  prog[key].total++;
  prog[key].time=(prog[key].time||0)+elapsedQ;
  if(ok){prog[key].right++; delete miss[q.id];} else {miss[q.id]=true; prog[key].misses=(prog[key].misses||0)+1; prog[key].missTime=(prog[key].missTime||0)+elapsedQ;}
  var c=confidence[i];
  if(c==="guessed" || c==="dontknow" || c==="tricked") no[q.id]=true;
  if(c==="knew" && no[q.id]) delete no[q.id];
  if(c==="tricked"){prog[key].tricked=(prog[key].tricked||0)+1; trickStats.fallen++;}
  trickStats.total++;
  if(!ok){
    var dkey=q.subtopic+" → "+selectedText;
    if(!distract[dkey]) distract[dkey]={subtopic:q.subtopic,lecture:q.lecture,answer:selectedText,count:0,correct:correctText};
    distract[dkey].count++;
  }
  if(confStats[c]){
    confStats[c].total++;
    if(ok) confStats[c].right++;
  }
  hist.push({date:Date.now(),mode:currentMode,total:1,right:ok?1:0,time:elapsedQ,confSingle:c,questionId:q.id,lecture:q.lecture,subtopic:q.subtopic,selected:selectedText,correct:correctText,tricked:c==="tricked"});
  hist=hist.slice(-1000);
  setStore("bc_prog_v3",prog);
  setStore("bc_miss_v3",miss);
  setStore("bc_noclue_v3",no);
  setStore("bc_seen_v3",seen);
  setStore("bc_conf_v3",confStats);
  setStore("bc_history_v3",hist);
  setStore("bc_distractors_v3",distract);
  setStore("bc_trick_v3",trickStats);
  savedQuestions[i]=true;
  updateHero();
}

function saveSession(){
  var prog=getStore("bc_prog_v3",{}), miss=getStore("bc_miss_v3",{}), no=getStore("bc_noclue_v3",{}), seen=getStore("bc_seen_v3",{}), hist=getStore("bc_history_v3",[]);
  var key=seenKey(currentMode); if(!seen[key])seen[key]=[]; var right=0, conf={knew:{right:0,total:0},guessed:{right:0,total:0},dontknow:{right:0,total:0},tricked:{right:0,total:0}};
  quiz.forEach(function(q,i){if(seen[key].indexOf(q.id)<0)seen[key].push(q.id);var k=q.lecture+"|"+q.subtopic;if(!prog[k])prog[k]={lecture:q.lecture,subtopic:q.subtopic,right:0,total:0};prog[k].total++;var ok=answers[i]===q.correct;if(ok){right++;prog[k].right++;delete miss[q.id];}else miss[q.id]=true;if(confidence[i]==="clueless")no[q.id]=true;if(confidence[i]==="got"&&no[q.id])delete no[q.id];if(conf[confidence[i]]){conf[confidence[i]].total++;if(ok)conf[confidence[i]].right++;}});
  hist.push({date:Date.now(),mode:currentMode,total:quiz.length,right:right,time:Math.floor((Date.now()-startTime)/1000),conf:conf});hist=hist.slice(-80);
  setStore("bc_prog_v3",prog);setStore("bc_miss_v3",miss);setStore("bc_noclue_v3",no);setStore("bc_seen_v3",seen);setStore("bc_history_v3",hist);
}

function renderAnalytics(){
  var s=stats(), h=getStore("bc_history_v3",[]), flagged=Object.keys(getStore("bc_flagged_v3",{})).length;
  var distract=Object.values(getStore("bc_distractors_v3",{}));
  var trick=getStore("bc_trick_v3",{fallen:0,total:0});
  if(!s.total){el("analytics").innerHTML="<section class='card'><div class='label'>Analytics</div><div class='small'>No data yet.</div></section>";return;}
  var totalQ=h.length || s.total;
  var totalTime=h.reduce(function(a,b){return a+(b.time||0);},0);
  var correctRows=h.filter(function(x){return x.right===1;});
  var missedRows=h.filter(function(x){return x.right===0;});
  var avgAll=totalQ?Math.round(totalTime/totalQ):0;
  var avgCorrect=correctRows.length?Math.round(correctRows.reduce(function(a,b){return a+(b.time||0);},0)/correctRows.length):0;
  var avgMissed=missedRows.length?Math.round(missedRows.reduce(function(a,b){return a+(b.time||0);},0)/missedRows.length):0;
  var missRate=totalQ?Math.round(missedRows.length/totalQ*100):0;
  var trickRate=trick.total?Math.round(trick.fallen/trick.total*100):0;

  var byLecture={};
  s.p.forEach(function(x){if(!byLecture[x.lecture])byLecture[x.lecture]={right:0,total:0,time:0,misses:0,missTime:0,tricked:0};byLecture[x.lecture].right+=x.right;byLecture[x.lecture].total+=x.total;byLecture[x.lecture].time+=(x.time||0);byLecture[x.lecture].misses+=(x.misses||0);byLecture[x.lecture].missTime+=(x.missTime||0);byLecture[x.lecture].tricked+=(x.tricked||0);});
  var lectureRows=Object.keys(byLecture).map(function(k){var x=byLecture[k],pct=Math.round(x.right/x.total*100),avg=x.total?Math.round(x.time/x.total):0;return "<tr><td><strong>"+esc(k)+"</strong><br><span class='small'>Avg "+avg+" sec/question · tricked "+(x.tricked||0)+"</span></td><td>"+pct+"%<br><span class='small'>"+x.right+"/"+x.total+"</span></td></tr>";}).join("");

  var topics=s.p.slice().sort(function(a,b){return (a.right/a.total)-(b.right/b.total);}).slice(0,12).map(function(x){var pct=Math.round(x.right/x.total*100),avg=x.total?Math.round((x.time||0)/x.total):0,missAvg=x.misses?Math.round((x.missTime||0)/x.misses):0;return "<tr><td><strong>"+esc(x.subtopic)+"</strong><br><span class='small'>"+esc(x.lecture)+" · avg "+avg+" sec · missed avg "+missAvg+" sec · tricked "+(x.tricked||0)+"</span></td><td>"+pct+"%<br><span class='small'>"+x.right+"/"+x.total+"</span></td></tr>";}).join("");

  var rawConf=getStore("bc_conf_v3",{knew:{right:0,total:0},guessed:{right:0,total:0},dontknow:{right:0,total:0},tricked:{right:0,total:0}});
  var conf={knew:{r:rawConf.knew.right||0,t:rawConf.knew.total||0},guessed:{r:rawConf.guessed.right||0,t:rawConf.guessed.total||0},dontknow:{r:rawConf.dontknow.right||0,t:rawConf.dontknow.total||0},tricked:{r:rawConf.tricked.right||0,t:rawConf.tricked.total||0}};
  function cRow(k,label){var x=conf[k],pct=x.t?Math.round(x.r/x.t*100):0;return "<tr><td><strong>"+label+"</strong></td><td>"+(x.t?pct+"%":"—")+"<br><span class='small'>"+x.r+"/"+x.t+"</span></td></tr>";}

  var topDistractors=distract.sort(function(a,b){return b.count-a.count;}).slice(0,10).map(function(x){return "<tr><td><strong>"+esc(x.subtopic)+"</strong><br><span class='small'>You picked: "+esc(x.answer)+"<br>Correct: "+esc(x.correct)+"</span></td><td>"+x.count+"x</td></tr>";}).join("") || "<tr><td class='small'>No distractor patterns yet.</td><td></td></tr>";
  var recent = h.slice(-15).reverse().map(function(x){return "<tr><td><strong>"+esc(x.subtopic||"")+"</strong><br><span class='small'>"+new Date(x.date).toLocaleDateString()+" · "+esc(x.confSingle||"")+" · "+(x.right?"correct":"missed")+"<br>Picked: "+esc(x.selected||"—")+"</span></td><td>"+(x.time||0)+" sec</td></tr>";}).join("");
  var recommendation=s.readiness>=85?"Use Review 50 and targeted weak drills only.":s.readiness>=75?"Prioritize Weak Areas, then rerun Review 50.":"Rebuild lowest subtopics before doing full review exams.";
  el("analytics").innerHTML="<section class='card'><div class='label'>Command Center</div><div class='kpi'><div class='box'><span class='small'>Readiness</span><strong>"+s.readiness+"%</strong></div><div class='box'><span class='small'>Accuracy</span><strong>"+s.acc+"%</strong></div><div class='box'><span class='small'>Total Questions</span><strong>"+totalQ+"</strong></div></div><div class='explain'><strong>Study recommendation:</strong><br>"+recommendation+"</div></section><section class='card'><div class='label'>Timing and Miss Patterns</div><div class='kpi'><div class='box'><span class='small'>Avg / Question</span><strong>"+avgAll+"s</strong></div><div class='box'><span class='small'>Avg Correct</span><strong>"+avgCorrect+"s</strong></div><div class='box'><span class='small'>Avg Missed</span><strong>"+avgMissed+"s</strong></div></div><div class='kpi' style='margin-top:10px'><div class='box'><span class='small'>Miss Rate</span><strong>"+missRate+"%</strong></div><div class='box'><span class='small'>Trick Rate</span><strong>"+trickRate+"%</strong></div><div class='box'><span class='small'>Flagged</span><strong>"+flagged+"</strong></div></div></section><section class='card'><div class='label'>Confidence Calibration</div><table>"+cRow("knew","I knew that")+cRow("guessed","I guessed")+cRow("dontknow","I don’t fucking know")+cRow("tricked","I got tricked")+"</table></section><section class='card'><div class='label'>Performance by Lecture</div><table><tr><th>Lecture</th><th>Score</th></tr>"+lectureRows+"</table></section><section class='card'><div class='label'>Lowest Percentage Subtopics</div><table><tr><th>Topic</th><th>Score</th></tr>"+topics+"</table></section><section class='card'><div class='label'>Distractor Patterns</div><table><tr><th>Distractor</th><th>Count</th></tr>"+topDistractors+"</table></section><section class='card'><div class='label'>Recent Question Log</div><table><tr><th>Question</th><th>Time</th></tr>"+recent+"</table></section>";
}

function renderSettings(){
  var flagged=Object.keys(getStore("bc_flagged_v3",{})).length;
  el("settings").innerHTML="<section class='card'><div class='label'>Settings</div><div class='toggle' id='hideToggle'><div><strong>Review 50 feedback</strong><div class='small'>Hide answers until the end.</div></div><div class='switch "+(hideExamAnswers?"on":"")+"' id='hideSwitch'><div class='knob'></div></div></div><div class='toggle' id='repeatSet'><div><strong>Prioritize Unseen Questions</strong><div class='small'>Use unseen questions before repeating old ones.</div></div><div class='switch "+(avoidRepeats?"on":"")+"' id='repeatSetSwitch'><div class='knob'></div></div></div><div class='toggle' id='autoAdvanceToggle'><div><strong>Auto Advance After Confidence</strong><div class='small'>Move to the next question after choosing confidence.</div></div><div class='switch "+(autoAdvance?"on":"")+"' id='autoAdvanceSwitch'><div class='knob'></div></div></div><button class='secondary' id='restoreFlagged' style='width:100%;margin-top:12px'>Restore flagged questions ("+flagged+")</button><button class='danger' id='resetAll' style='width:100%;margin-top:12px'>Reset all progress</button></section>";
  el("hideToggle").onclick=function(){hideExamAnswers=!hideExamAnswers;setStore("bc_hide_exam_v3",hideExamAnswers);renderSettings();};
  el("repeatSet").onclick=function(){avoidRepeats=!avoidRepeats;setStore("bc_avoid_v3",avoidRepeats);renderSettings();};
  el("autoAdvanceToggle").onclick=function(){autoAdvance=!autoAdvance;setStore("bc_auto_advance_v3",autoAdvance);renderSettings();};
  el("restoreFlagged").onclick=function(){if(confirm("Restore all flagged questions?")){localStorage.removeItem("bc_flagged_v3");renderSettings();}};
  el("resetAll").onclick=function(){if(confirm("Reset all saved progress?")){["bc_prog_v3","bc_miss_v3","bc_noclue_v3","bc_seen_v3","bc_history_v3","bc_conf_v3","bc_distractors_v3","bc_trick_v3","bc_flagged_v3"].forEach(function(k){localStorage.removeItem(k);});renderSettings();updateHero();}};
}


function buildStudy(){
  var lectures=["All"];
  LECTURE.forEach(function(q){if(lectures.indexOf(q.lecture)<0) lectures.push(q.lecture);});
  var lg=el("studyLectureGrid");
  if(lg){
    lg.innerHTML="";
    lectures.forEach(function(name){
      var count=name==="All"?LECTURE.length:LECTURE.filter(function(q){return q.lecture===name;}).length;
      var b=document.createElement("button");
      b.className="tile"+(name===selectedLecture?" selected":"");
      b.innerHTML="<strong>"+esc(name)+"</strong><br><span class='small'>"+count+" questions</span>";
      b.onclick=function(){selectedLecture=name;haptic();};
      lg.appendChild(b);
    });
  }
  var wheel=el("studyCountWheel"), num=el("studyCountNumber"), hint=el("studyCountHint");
  if(wheel && num){
    wheel.min=1; wheel.max=100; num.min=1; num.max=100;
    if(selectedCount<1) selectedCount=1;
    if(selectedCount>100) selectedCount=100;
    wheel.value=selectedCount; num.value=selectedCount;
    if(hint) hint.textContent=selectedCount+" question"+(selectedCount===1?"":"s")+" selected";
    wheel.oninput=function(){selectedCount=Number(wheel.value);num.value=selectedCount;if(hint) hint.textContent=selectedCount+" question"+(selectedCount===1?"":"s")+" selected";};
    num.oninput=function(){var v=Math.max(1,Math.min(100,Number(num.value)||1));selectedCount=v;wheel.value=v;if(hint) hint.textContent=v+" question"+(v===1?"":"s")+" selected";};
  }
}

function show(page){
  ["home","quiz","results","weak","analytics","settings"].forEach(function(id){el(id).classList.toggle("hidden",id!==page);});
  ["tabHome","tabAnalytics","tabSettings"].forEach(function(id){el(id).classList.remove("active");});
  if(page==="weak"){el("tabHome").classList.add("active");renderWeak();}
  else if(page==="analytics"){el("tabAnalytics").classList.add("active");renderAnalytics();}
  else if(page==="settings"){el("tabSettings").classList.add("active");renderSettings();}
  else if((currentMode==="review"||currentMode==="practice"||currentMode==="weak"||currentMode==="focused")&&(page==="quiz"||page==="results"))el("tabHome").classList.add("active");
  else if(page==="home") el("tabHome").classList.add("active");
  else if(page==="home") el("tabHome").classList.add("active");
  else el("tabHome").classList.add("active");
  if(page==="home"){buildHome();}
  window.scrollTo(0,0);
}

el("homeTitle").onclick=function(){currentMode="practice";show("home");};
currentMode="practice";start("practice");};};}; if(p){p.classList.toggle("hidden"); p.scrollIntoView({behavior:"smooth",block:"start"});}};};

el("preparedMetric").onclick=function(){show("analytics");};
el("weakMetric").onclick=function(){start("weak");};
el("homePractice").onclick=function(){selectedLecture="All";currentMode="practice";start("practice");};
el("homeReview").onclick=function(){start("review",50);};

el("homeCustomize").onclick=function(){var p=el("customPanel"); if(p){p.classList.toggle("hidden"); p.scrollIntoView({behavior:"smooth",block:"start"});}};
el("startPractice").onclick=function(){start("practice");};
el("prev").onclick=function(){if(idx>0){idx--;questionStartTime=Date.now();renderQuestion();saveActiveSession();window.scrollTo(0,0);}};
el("next").onclick=function(){if(answers[idx]===null)return;if(idx<quiz.length-1){idx++;questionStartTime=Date.now();renderQuestion();saveActiveSession();window.scrollTo(0,0);}else finish();};
el("quit").onclick=function(){show("home");};
el("tabHome").onclick=function(){currentMode="practice";show("home");};show("study");};
el("tabAnalytics").onclick=function(){show("analytics");};

buildHome();
